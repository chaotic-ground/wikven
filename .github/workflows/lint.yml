---
name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      # The version is autodetected from the $schema URL in biome.json.
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51  # v2.7.1
      - run: biome ci

  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: rvben/rumdl@c5f50cbbbc790d7adb5583b51e4322ed3dcae65c  # v0.2.28

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91  # v2
        with:
          version: "0.10.0"
      - run: taplo fmt --check
      - run: taplo check

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - run: pipx install yamllint==1.38.0
      - run: yamllint --strict .

  mago:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # 2.37.2
        with:
          php-version: "8.3"
          tools: composer
      # mago.toml extends the shared style config installed under vendor/, so install it first.
      - run: composer install --no-interaction --no-progress --ignore-platform-req=ext-ast
      - uses: nhedger/setup-mago@473d3a2bfe0b32a62c8b910059d7f03a16519f2e  # v2.0.0
        with:
          version: "1.29.0"
      - run: mago format --check
      - run: mago lint

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa  # v0.5.7

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14  # v1.48.0

  # MediaWiki coding-standard checks mago doesn't cover: docs, naming, and forbidden patterns.
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # 2.37.2
        with:
          # Lint tools (codesniffer, grumphp, minus-x) need PHP >= 8.2; just the runner, not wikven's target.
          php-version: "8.3"
          tools: composer
      # mediawiki-phan-config pulls in phan (needs ext-ast); phpcs doesn't, so ignore that platform req.
      - run: composer install --no-interaction --no-progress --ignore-platform-req=ext-ast
      - run: composer phpcs
