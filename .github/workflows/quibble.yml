---
name: Quibble

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  # phan needs a full MediaWiki environment to resolve core symbols; mago and phpcs can't provide one.
  phan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mediawiki-version: [REL1_45, master]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: femiwiki/quibble-action@9964af476e606e1dc7e14ee13db34f99456f3c41  # main
        with:
          stage: phan
          mediawiki-version: ${{ matrix.mediawiki-version }}
          # PHP 8.3 image so the container resolves wikven's dev deps (>= 8.2); phan runs in the action's testrun image.
          quibble-docker-image: quibble-bookworm-php83

  composer-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: femiwiki/quibble-action@9964af476e606e1dc7e14ee13db34f99456f3c41  # main
        with:
          stage: composer-test
          mediawiki-version: REL1_45
          # PHP 8.3 image: wikven's dev deps (minus-x etc.) require >= 8.2.
          quibble-docker-image: quibble-bookworm-php83

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - id: quibble
        uses: femiwiki/quibble-action@9964af476e606e1dc7e14ee13db34f99456f3c41  # main
        with:
          stage: coverage
          # Coverage tooling lives only on MediaWiki master.
          mediawiki-version: master
          quibble-docker-image: quibble-bookworm-php83
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ${{ steps.quibble.outputs.coverage }}/clover.xml
          use_oidc: true
