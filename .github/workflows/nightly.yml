---
name: Nightly binary

# Build the standalone binary from the tip of main every day and publish it as a
# dated pre-release: releases/download/nightly-<date>/wikven-linux-<arch>.
#
# GitHub's immutable releases lock a release's assets the moment it is published,
# so a single rolling tag can't be refreshed in place. Instead each run creates
# its own draft (drafts stay mutable), attaches the binaries, then publishes it.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  # Build only when a feat/fix landed since the last nightly; a scheduled run
  # after only chores/CI is skipped.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: check
        run: |
          proceed=false
          last=$(git tag -l 'nightly-*' | sort -r | head -1)
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ] || [ -z "$last" ]; then
            proceed=true
          elif git log "$last..HEAD" --format='%s' | grep -qE '^(feat|fix)(\(.+\))?!?:'; then
            proceed=true
          fi
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

  prepare:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the dated pre-release
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Pick a dated tag for this build
        id: meta
        run: echo "tag=nightly-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # Create the pre-release as a draft so the binary job can attach assets;
      # immutable releases only lock once published. Drop any leftover draft from
      # a failed same-day run first.
      - name: Create the dated draft pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes --cleanup-tag || true
          gh release create "$TAG" \
            --draft \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "Nightly ${TAG#nightly-}" \
            --notes "Standalone binaries built from main ($GITHUB_SHA)."

  binary:
    needs: prepare
    permissions:
      contents: write  # gh release upload
      id-token: write  # sign the build provenance attestation
      attestations: write  # write the build provenance attestation
    uses: ./.github/workflows/build-binary.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}

  publish:
    needs: [prepare, binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # publish (un-draft) the release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      # Publishing locks the assets under immutable releases, so do it only once
      # every architecture has been attached.
      - name: Publish the dated pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
