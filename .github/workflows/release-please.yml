---
name: Release Please

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        id: release
        with:
          # Dotfile config to match the dot-prefixed manifest; config-file points the action at it.
          config-file: .release-please-config.json

  # release-please drafts the release (immutable releases lock assets at publish), so binaries attach first.
  binary:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write  # gh release upload
      id-token: write  # sign the build provenance attestation
      attestations: write  # write the build provenance attestation
    uses: ./.github/workflows/build-binary.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}

  # Publish a versioned, pinnable image (:1.0.0, :1.0, :1, :latest) so the install path matches the release.
  docker:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}

  publish:
    needs: [release-please, binary, docker]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # publish (un-draft) the release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release edit "$TAG" --draft=false
