---
name: Build binary

# Reusable: build the standalone binary for each architecture and attach it to
# the given release tag. Called by release-please.yml and nightly.yml.
on:
  workflow_call:
    inputs:
      tag:
        description: The release tag to upload the binaries to.
        required: true
        type: string

permissions: {}

jobs:
  binary:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write  # gh release upload
      id-token: write  # sign the build provenance attestation
      attestations: write  # write the build provenance attestation
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build the wikven image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          load: true
          tags: wikven
          cache-from: type=gha,scope=wikven-image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=wikven-image-${{ matrix.arch }}

      # binary.Dockerfile's export target FROMs the loaded image and writes out the compiled binary.
      - name: Build the standalone binary
        run: docker build -f binary.Dockerfile --target export -o type=local,dest=out .

      - name: Name it per architecture
        run: mv out/wikven "wikven-linux-${{ matrix.arch }}"

      - name: Generate the checksum
        run: sha256sum "wikven-linux-${{ matrix.arch }}" > "wikven-linux-${{ matrix.arch }}.sha256"

      # Sign the build provenance so users can `gh attestation verify` the binary.
      - name: Attest the binary
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: wikven-linux-${{ matrix.arch }}

      - name: Attach to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: >-
          gh release upload "$TAG"
          "wikven-linux-${{ matrix.arch }}"
          "wikven-linux-${{ matrix.arch }}.sha256"
          --clobber
