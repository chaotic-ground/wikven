---
name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'Dockerfile'
      - 'bin/entrypoint'
      - 'default.yml'
      - 'extension.json'
      - 'includes/**'
      - 'maintenance/**'
      - 'resources/**'
      - 'i18n/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, and let a newer run supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
        with:
          enablement: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Build this commit's image (shared GHA layer cache) and load it locally.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          load: true
          tags: wikven
          cache-from: type=gha,scope=wikven-image
          cache-to: type=gha,mode=max,scope=wikven-image

      # Dogfood the published composite action to bake the docs source.
      - name: Bake the docs site
        uses: ./action
        with:
          source: docs
          output: dist
          image: wikven
          cache: false  # the image was just built locally; nothing to cache or pull

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
