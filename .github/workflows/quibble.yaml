name: Quibble

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  # phan needs a full MediaWiki environment to resolve core symbols, which neither
  # mago's analyzer nor a bare phpcs run can provide.
  phan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mediawiki-version: [REL1_45, master]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: femiwiki/quibble-action@ffc9227efa59e085ef82243d81b122ec9c673e53 # main
        with:
          stage: phan
          mediawiki-version: ${{ matrix.mediawiki-version }}
          # PHP 8.3 image, so the container resolves wikven's dev deps (which
          # require >= 8.2). phan itself runs in the action's default
          # mediawiki-phan-testrun image (php-ast 1.1.3, the maintained one).
          quibble-docker-image: quibble-bookworm-php83

  composer-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: femiwiki/quibble-action@ffc9227efa59e085ef82243d81b122ec9c673e53 # main
        with:
          stage: composer-test
          mediawiki-version: REL1_45
          # PHP 8.3 image: wikven's dev deps (minus-x etc.) require >= 8.2.
          quibble-docker-image: quibble-bookworm-php83

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - id: quibble
        uses: femiwiki/quibble-action@ffc9227efa59e085ef82243d81b122ec9c673e53 # main
        with:
          stage: coverage
          # Coverage tooling lives only on MediaWiki master.
          mediawiki-version: master
          quibble-docker-image: quibble-bookworm-php83
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ${{ steps.quibble.outputs.coverage }}/clover.xml
          use_oidc: true
