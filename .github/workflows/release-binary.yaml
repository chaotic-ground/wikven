name: Release binary

# When release-please publishes a GitHub Release, build the standalone binary
# (one per architecture) and attach it to that release.
on:
  release:
    types: [published]

permissions: {}

jobs:
  binary:
    permissions:
      contents: write
    uses: ./.github/workflows/build-binary.yaml
    with:
      tag: ${{ github.event.release.tag_name }}
