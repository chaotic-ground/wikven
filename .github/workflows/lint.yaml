name: Lint

on: [push, pull_request]

permissions: {}

jobs:
  biome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # The version is autodetected from the $schema URL in biome.json.
      - uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
      - run: biome ci

  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: rvben/rumdl@c865358794ca767361fe7d2947ad631ac8a89996 # v0.2.10

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: uncenter/setup-taplo@b18c8c8302695fe63d6853bc004006215ac52b91 # v2
        with:
          version: "0.10.0"
      - run: taplo fmt --check
      - run: taplo check

  mago:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: nhedger/setup-mago@473d3a2bfe0b32a62c8b910059d7f03a16519f2e # v2.0.0
      - run: mago format --check

  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  # MediaWiki coding-standard checks that mago (the formatter) does not cover:
  # documentation, naming, forbidden patterns, and other semantic rules. The
  # whitespace sniffs mago owns are excluded in .phpcs.xml.
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          # The lint tools (codesniffer, grumphp, minus-x) require PHP >= 8.2;
          # this is only the environment phpcs runs in, not wikven's target.
          php-version: "8.3"
          tools: composer
      # mediawiki-phan-config (a dev dep, used only by the Quibble phan job)
      # pulls in phan, which requires ext-ast; phpcs does not need it.
      - run: composer install --no-interaction --no-progress --ignore-platform-req=ext-ast
      - run: composer phpcs
