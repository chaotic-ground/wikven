---
name: Smoke test

# Bake the docs source with the real image and assert the output is a complete,
# self-contained site. The unit suite covers only helper classes, so without
# this a regression anywhere in the bake pipeline (maintenance/, AssetLocalizer,
# hooks, Dockerfile) would produce a broken site yet pass every other gate.
on:
  push:
    branches: [main]
    paths: &paths
      - 'Dockerfile'
      - 'bin/entrypoint'
      - 'default.yml'
      - 'extension.json'
      - 'includes/**'
      - 'maintenance/**'
      - 'resources/**'
      - 'i18n/**'
      - 'docs/**'
      - '.github/workflows/smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'playwright.config.js'
      - 'tests/e2e/**'
  pull_request:
    paths: *paths

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # Shared GHA layer cache (same scope as docker-build.yml); load locally so the bake can run it.
      - name: Build and load the wikven image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          load: true
          tags: wikven
          cache-from: type=gha,scope=wikven-image
          cache-to: type=gha,mode=max,scope=wikven-image

      - name: Bake the docs site
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$(pwd)/docs:/workspace/src" \
            -v "$(pwd)/dist:/workspace/dist" \
            wikven

      - name: Assert the bake produced a complete, self-contained site
        run: |
          set -euo pipefail
          # The main page must land at the dist root (a failed import already aborted the build).
          test -s dist/index.html

          # Dumped CSS must not reference load.php (a live-only endpoint); a leftover is an AssetLocalizer regression.
          if grep -rIl --include='*.css' 'load\.php' dist; then
            echo "::error::dumped CSS still references load.php (AssetLocalizer regression)"
            exit 1
          fi

          echo "Smoke checks passed."

      # Node.js is preinstalled on the runner; no setup-node (its caching trips
      # the cache-poisoning audit, and this job shares a build cache with the
      # image-publishing workflow).
      - name: Install the browser test tooling
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Serve dist under the site's own /wikven/ path prefix (as GitHub Pages does) so the
      # Pagefind bundle and results page resolve, then drive it with a headless browser.
      - name: Assert the rendered site in a browser
        env:
          WIKVEN_BASE_URL: http://127.0.0.1:8080/wikven/
        run: |
          mkdir -p pw-root
          ln -sfn "$PWD/dist" pw-root/wikven
          python3 -m http.server 8080 --directory pw-root &
          server=$!
          trap 'kill $server' EXIT
          for _ in $(seq 1 30); do
            curl -sf -o /dev/null "${WIKVEN_BASE_URL}index.html" && break
            sleep 0.5
          done
          npm run test:e2e
