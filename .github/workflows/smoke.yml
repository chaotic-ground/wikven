---
name: Smoke test

# Bake the docs source with the real image and assert the output is a complete,
# self-contained site. The unit suite covers only helper classes, so without
# this a regression anywhere in the bake pipeline (maintenance/, AssetLocalizer,
# hooks, Dockerfile) would produce a broken site yet pass every other gate.
on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'bin/entrypoint'
      - 'default.yml'
      - 'extension.json'
      - 'includes/**'
      - 'maintenance/**'
      - 'resources/**'
      - 'i18n/**'
      - 'docs/**'
      - '.github/workflows/smoke.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'bin/entrypoint'
      - 'default.yml'
      - 'extension.json'
      - 'includes/**'
      - 'maintenance/**'
      - 'resources/**'
      - 'i18n/**'
      - 'docs/**'
      - '.github/workflows/smoke.yml'

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # Shared GHA layer cache (same scope as docker-build.yml); load locally so the bake can run it.
      - name: Build and load the wikven image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          load: true
          tags: wikven
          cache-from: type=gha,scope=wikven-image
          cache-to: type=gha,mode=max,scope=wikven-image

      - name: Bake the docs site
        run: |
          mkdir -p dist
          docker run --rm \
            -v "$(pwd)/docs:/workspace/src" \
            -v "$(pwd)/dist:/workspace/dist" \
            wikven

      - name: Assert the bake produced a complete, self-contained site
        run: |
          set -euo pipefail
          # The main page must land at the dist root (a failed import already aborted the build).
          test -s dist/index.html

          # Dumped CSS must not reference load.php (a live-only endpoint); a leftover is an AssetLocalizer regression.
          if grep -rIl --include='*.css' 'load\.php' dist; then
            echo "::error::dumped CSS still references load.php (AssetLocalizer regression)"
            exit 1
          fi

          echo "Smoke checks passed."
