extensions:
  - SyntaxHighlight_GeSHi
  - ParserFunctions
  - TemplateStyles
  - TabberNeue
  - Gadgets
  - SifterSearch
skins:
  - Vector
  - Timeless
  - Citizen
config:
  WikvenFooterUrl: https://github.com/chaotic-ground/wikven
  WikvenEditUrl: https://github.com/chaotic-ground/wikven/edit/main/docs/$1
  WikvenHistoryUrl: https://github.com/chaotic-ground/wikven/commits/main/docs/$1
  WikvenViewSourceUrl: https://github.com/chaotic-ground/wikven/blob/main/docs/$1
  WikvenLogos:
    icon: logo.svg
  # Search results have no thumbnails, so drop the empty thumbnail column from
  # the typeahead.
  VectorTypeahead:
    apiUrl: null
    recommendationApiUrl: null
    options:
      showThumbnail: false
      showDescription: true
  # Pagefind index: written into the build output (/workspace/dist in the image),
  # served under /wikven on GitHub Pages.
  SifterSearchOutputDir: /workspace/dist/pagefind
  SifterSearchBundlePath: /wikven/pagefind/
  # No full-text search page on a static export, so hide that affordance.
  SifterSearchFullText: false
  SifterSearchResultsPage: "Search"
  WikvenRepositories:
    # TabberNeue is not bundled in the image; clone it from Git to show off
    # third-party fetching. (TemplateStyles, which the templates use, is bundled
    # in MediaWiki 1.45, so it needs no source here.)
    TabberNeue:
      repository: https://github.com/StarCitizenTools/mediawiki-extensions-TabberNeue.git
      reference: v4.0.0
    # Citizen is a third-party skin; its search is its own REST-backed command
    # palette, which has no backend on a static export, so it is hidden (see
    # Adder.php). The other skins keep working SifterSearch search.
    Citizen:
      repository: https://github.com/StarCitizenTools/mediawiki-skins-Citizen.git
      reference: v3.17.0
    # The rolling nightly tarball bundles the Pagefind binary (a git clone omits
    # it). No sha256: it rolls, so a SifterSearch change is picked up by
    # triggering the nightly and rebuilding, with no re-pin here.
    SifterSearch:
      tarball: https://github.com/chaotic-ground/SifterSearch/releases/download/nightly/SifterSearch-linux-x64.tar.gz
