extensions:
  - SyntaxHighlight_GeSHi
  - ParserFunctions
  - TemplateStyles
  - Variables
skins:
  - Vector
config:
  WikvenFooterUrl: https://github.com/chaotic-ground/wikven
  WikvenEditUrl: https://github.com/chaotic-ground/wikven/edit/main/docs/$1.wikitext
  WikvenHistoryUrl: https://github.com/chaotic-ground/wikven/commits/main/docs/$1.wikitext
  WikvenLogos:
    icon: logo.svg
  WikvenRepositories:
    # Variables is not bundled in the image; clone it from Git to show off
    # third-party fetching. (TemplateStyles, which the templates use, is bundled
    # in MediaWiki 1.45, so it needs no source here.)
    Variables:
      repository: https://github.com/wikimedia/mediawiki-extensions-Variables.git
      reference: REL1_45
