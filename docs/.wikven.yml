---
extensions:
  - Gadgets
  - ParserFunctions
  - SyntaxHighlight_GeSHi
  - TabberNeue
  - TemplateStyles
  - Translate
  - UniversalLanguageSelector
skins:
  - Timeless
  - Citizen
config:
  WikvenFooterUrl: https://github.com/chaotic-ground/wikven
  WikvenEditUrl: https://github.com/chaotic-ground/wikven/edit/main/docs/$1
  WikvenHistoryUrl: https://github.com/chaotic-ground/wikven/commits/main/docs/$1
  WikvenViewSourceUrl: https://github.com/chaotic-ground/wikven/blob/main/docs/$1
  WikvenLogos:
    icon: logo.svg
  # Search results have no thumbnails, so drop the empty thumbnail column from
  # the typeahead.
  VectorTypeahead:
    apiUrl: null
    recommendationApiUrl: null
    options:
      showThumbnail: false
      showDescription: true
  # SifterSearch is built in and indexes into dist by default; this site serves under /wikven.
  SifterSearchBundlePath: /wikven/pagefind/
  SifterSearchResultsPage: "Search"
  WikvenRepositories:
    # TabberNeue is not bundled in the image; clone it from Git to show off
    # third-party fetching. (TemplateStyles, which the templates use, is bundled
    # in MediaWiki 1.45, so it needs no source here.)
    TabberNeue:
      repository: https://github.com/StarCitizenTools/mediawiki-extensions-TabberNeue.git
      reference: v4.0.0
    # Citizen is a third-party skin; its search is its own REST-backed command
    # palette with no backend on a static export, so MediaWiki:Citizen.css hides
    # it. The other skins keep working SifterSearch search.
    Citizen:
      repository: https://github.com/StarCitizenTools/mediawiki-skins-Citizen.git
      reference: v3.17.0
