# Wikven's default MediaWiki configuration, in the same format as your
# .wikven.yaml. Wikven loads this first and then your .wikven.yaml on top, so any
# key you set there overrides the value here. You do not edit this file; it ships
# with wikven (https://github.com/chaotic-ground/wikven). Build-only mechanics
# (the file cache, favicon, and logo handling) live in WikvenSettings.php.
config:
  Sitename: Wikven
  CapitalLinks: false
  RestrictDisplayTitle: false
  UseInstantCommons: true

  # Local images: source-directory image files are uploaded into the File:
  # namespace at build time. ImageMagick scales raster thumbnails; rsvg-convert
  # rasterizes SVG thumbnails.
  EnableUploads: true
  UseImageMagick: true
  ImageMagickConvertCommand: /usr/bin/convert
  FileExtensions: [png, gif, jpg, jpeg, webp, svg]
  SVGConverter: rsvg
  SVGConverterPath: /usr/bin

  # Treat File: pages (namespace 6) as content alongside the main namespace (0),
  # so the file cache exports them without dumping every Template:/MediaWiki: page.
  ContentNamespaces: [0, 6]

  # The static export runs its own jobs and ships its own module bundle.
  JobRunRate: 0
  ResourceLoaderStorageEnabled: false

  # Skin (Vector 2022).
  VectorDefaultSkinVersion: "2"
  VectorStickyHeader: { logged_out: true }
  VectorLanguageInHeader: { logged_out: true }
  VectorResponsive: true
