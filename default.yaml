# Wikven's default MediaWiki configuration, in the same format as your
# .wikven.yaml. Wikven loads this first and then your .wikven.yaml on top, so any
# key you set there overrides the value here. You do not edit this file; it ships
# with wikven (https://github.com/chaotic-ground/wikven). Build-only mechanics
# (the file cache, favicon, and logo handling) live in WikvenSettings.php.
config:
  Sitename: Wikven

  # Keep the first letter of page titles as written instead of force-capitalizing
  # it (MediaWiki's default). The entry page is the lowercase "index", which the
  # build writes as index.html, the file a static host (GitHub Pages, and web
  # servers generally) serves at the site root. With the default, index.wikitext
  # would become the page "Index", and so "Index.html", and the root URL would
  # not resolve.
  CapitalLinks: false

  # Let {{DISPLAYTITLE}} set any shown title. MediaWiki's default only allows a
  # display title that normalizes back to the real one, which would reject e.g.
  # the ".wikven.yaml" page displaying a leading dot.
  RestrictDisplayTitle: false

  # Embed files from Wikimedia Commons without uploading them. See Images.
  UseInstantCommons: true

  # Local images: source-directory image files are uploaded into the File:
  # namespace at build time. The thumbnailing backend (ImageMagick or GD, and
  # rsvg or native SVG) is not set here; WikvenSettings.php detects it at run time
  # from the tools available on the host, so the same build works in the Docker
  # image and in a standalone binary that has only GD.
  EnableUploads: true
  FileExtensions: [png, gif, jpg, jpeg, webp, svg]

  # Store uploads flat (images/<name>) instead of in MediaWiki's default
  # md5-hashed subdirectories (images/a/ab/<name>). The static export has a
  # single flat upload dir per build, so the hashing buys nothing, and a flat
  # layout gives every upload a predictable URL. That predictable URL is what
  # lets WikvenLogos point $wgLogos straight at an uploaded logo file (see
  # WikvenSettings.php) instead of inlining it into every page.
  HashedUploadDirectory: false

  # Which namespaces count as content. MediaWiki's default is the main namespace
  # alone ([0]); Wikven adds File: (namespace 6) so the file cache exports file
  # description pages too, without dumping every Template:/MediaWiki: page.
  ContentNamespaces: [0, 6]

  # The static export runs its own jobs and ships its own module bundle.
  JobRunRate: 0
  ResourceLoaderStorageEnabled: false

  # Vector 2022 options. The skin itself is selected in .wikven.yaml via skins:;
  # loading "Vector" defaults to its first variant, vector-2022. (The old
  # VectorDefaultSkinVersion no longer exists in Vector and is not set here.)
  VectorStickyHeader: { logged_out: true }
  VectorLanguageInHeader: { logged_out: true }
  VectorResponsive: true
